<main class="main-content">
  <h2 class="text-center mb-4">Bem-vindo à Gestão de Pacientes</h2>
  <div class="container mt-4">
    <div class="row mt-4">
      <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <button class="btn btn-primary" (click)="abrirModalBusca()">Pesquisar Paciente</button>
          <button class="btn btn-secondary" (click)="navegarPara('home')">Voltar</button>
        </div>
        <div class="row">
          <div class="col-12">
            <div class="input-group mb-3">
              <input type="text" class="form-control" placeholder="Buscar paciente..." [(ngModel)]="filtroNome" />
            </div>
            <table class="table table-striped" *ngIf="pacientes.length > 0">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Atualização</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let paciente of pacientes">
                  <td>{{ paciente.nome_completo }}</td>
                  <td>{{ paciente.updated_at | date: 'dd/MM/yyyy HH:mm' }}</td>
                  <td>
                    <button class="btn btn-primary" (click)="acompanharPaciente(paciente.id)">Acompanhamento</button>
                  </td>
                </tr>
              </tbody>
            </table>
            <div *ngIf="pacientes.length === 0" class="text-center">
              Nenhum paciente encontrado.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
