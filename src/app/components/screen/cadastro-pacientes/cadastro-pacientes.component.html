<form (ngSubmit)="cadastrarPaciente()">
  <label for="nome_completo">Nome Completo:</label>
  <input id="nome_completo" [(ngModel)]="paciente.nome_completo" name="nome_completo" required>

  <label for="cpf">CPF:</label>
  <input id="cpf" [(ngModel)]="paciente.cpf" name="cpf" required>

  <label for="operadora">Operadora:</label>
  <input id="operadora" [(ngModel)]="paciente.operadora" name="operadora" required>

  <label for="identificador_prestadora">Identificador Prestadora:</label>
  <input id="identificador_prestadora" [(ngModel)]="paciente.identificador_prestadora" name="identificador_prestadora" required>

  <label for="acomodacao">Acomodação:</label>
  <input id="acomodacao" [(ngModel)]="paciente.acomodacao" name="acomodacao" required>

  <label for="telefone">Telefone:</label>
  <input id="telefone" [(ngModel)]="paciente.telefone" name="telefone" required>

  <label for="alergias">Alergias:</label>
  <input id="alergias" [(ngModel)]="paciente.alergias" name="alergias">

  <label for="cid_primario">CID Primário:</label>
  <input id="cid_primario" [(ngModel)]="paciente.cid_primario" name="cid_primario" required>

  <label for="cid_secundario">CID Secundário:</label>
  <input id="cid_secundario" [(ngModel)]="paciente.cid_secundario" name="cid_secundario">

  <label for="data_nascimento">Data de Nascimento:</label>
  <input id="data_nascimento" [(ngModel)]="paciente.data_nascimento" name="data_nascimento" required>

  <label for="cep">CEP:</label>
  <input id="cep" [(ngModel)]="paciente.cep" name="cep" required (blur)="buscarEndereco()">

  <label for="rua">Rua:</label>
  <input id="rua" [(ngModel)]="paciente.rua" name="rua">

  <label for="numero">Número:</label>
  <input id="numero" [(ngModel)]="paciente.numero" name="numero">

  <label for="complemento">Complemento:</label>
  <input id="complemento" [(ngModel)]="paciente.complemento" name="complemento">

  <label for="bairro">Bairro:</label>
  <input id="bairro" [(ngModel)]="paciente.bairro" name="bairro" required>

  <label for="cidade">Cidade:</label>
  <input id="cidade" [(ngModel)]="paciente.cidade" name="cidade" required>

  <label for="estado">Estado:</label>
  <input id="estado" [(ngModel)]="paciente.estado" name="estado" required>

  <label for="status">Status:</label>
  <select id="status" [(ngModel)]="paciente.status" name="status" required>
    <option value="em-avaliacao">Em Avaliação</option>
    <option value="ativo">Ativo</option>
    <option value="alta-administrativa">Alta Administrativa</option>
    <option value="alta-obito">Alta Óbito</option>
    <option value="alta-melhora">Alta Melhora</option>
    <option value="alta-hospitalar">Alta Hospitalar</option>
    <option value="encerrado">Encerrado</option>
  </select>

  <button type="submit">Cadastrar</button>
</form>
