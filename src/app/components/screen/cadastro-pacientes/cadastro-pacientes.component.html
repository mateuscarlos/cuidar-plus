<form
  (ngSubmit)="cadastrarPaciente()"
  class="form-user p-4 shadow rounded container mt-4"
>
  <!-- Informações do Paciente -->
  <fieldset id="informacoesPaciente" class="mb-4">
    <legend>Informações do Paciente</legend>
    <div class="form-group-inline">
      <div class="form-group">
        <label for="nome_completo" class="form-label">Nome Completo: *</label>
        <input
          id="nome_completo"
          [(ngModel)]="paciente.nome_completo"
          name="nome_completo"
          class="form-control"
          required
        />
      </div>
      <div class="form-group">
        <label for="status" class="form-label">Status</label>
        <select
          id="status"
          class="form-select"
          [(ngModel)]="paciente.status"
          name="status"
        >
          <option value="em-avaliacao">Em Avaliação</option>
          <option value="ativo">Ativo</option>
          <option value="alta-administrativa">Alta Administrativa</option>
          <option value="alta-obito">Alta Óbito</option>
          <option value="alta-melhora">Alta Melhora</option>
          <option value="alta-hospitalar">Alta Hospitalar</option>
          <option value="encerrado">Encerrado</option>
        </select>
      </div>
    </div>
    <div class="form-group-inline">
      <div class="form-group">
        <label for="cpf" class="form-label">CPF (somente números): *</label>
        <input
          id="cpf"
          [(ngModel)]="paciente.cpf"
          name="cpf"
          class="form-control"
          required
          mask="000.000.000-00"
        />
      </div>
      <div class="form-group">
        <label for="data_nascimento" class="form-label"
          >Data de Nascimento: *</label
        >
        <input
          id="data_nascimento"
          [(ngModel)]="paciente.data_nascimento"
          name="data_nascimento"
          class="form-control"
          required
        />
      </div>
      <div class="form-group">
        <label for="telefone" class="form-label">Telefone: *</label>
        <input
          id="telefone"
          [(ngModel)]="paciente.telefone"
          name="telefone"
          class="form-control"
          required
          mask="(00) 00000-0000"
        />
      </div>
    </div>
  </fieldset>

  <!-- Endereço -->
  <fieldset id="endereco" class="mb-4">
    <legend>Endereço</legend>
    <div class="mb-3">
      <label for="cep" class="form-label">CEP (somente números): *</label>
      <input
        id="cep"
        [(ngModel)]="paciente.cep"
        name="cep"
        class="form-control"
        required
        mask="00000-000"
        (blur)="buscarEndereco()"
      />
    </div>

    <div class="mb-3">
      <label for="rua" class="form-label">Rua:</label>
      <input
        id="rua"
        [(ngModel)]="paciente.rua"
        name="rua"
        class="form-control"
      />
    </div>
    <div class="form-group-inline">
      <div class="form-group">
        <label for="numero" class="form-label">Número:</label>
        <input
          id="numero"
          [(ngModel)]="paciente.numero"
          name="numero"
          class="form-control"
        />
      </div>
      <div class="form-group">
        <label for="complemento" class="form-label">Complemento:</label>
        <input
          id="complemento"
          [(ngModel)]="paciente.complemento"
          name="complemento"
          class="form-control"
        />
      </div>
      <div class="form-group">
        <label for="bairro" class="form-label">Bairro: *</label>
        <input
          id="bairro"
          [(ngModel)]="paciente.bairro"
          name="bairro"
          class="form-control"
          required
        />
      </div>

      <div class="form-group">
        <label for="cidade" class="form-label">Cidade: *</label>
        <input
          id="cidade"
          [(ngModel)]="paciente.cidade"
          name="cidade"
          class="form-control"
          required
        />
      </div>

      <div class="form-group">
        <label for="estado" class="form-label">Estado: *</label>
        <input
          id="estado"
          [(ngModel)]="paciente.estado"
          name="estado"
          class="form-control"
          required
        />
      </div>
    </div>
  </fieldset>

  <!-- Informações de Saúde -->
  <fieldset id="informacoesSaude" class="mb-4">
    <legend>Informações de Saúde</legend>
    <div class="row mb-3">
      <div class="col-md-12">
        <label for="alergias" class="form-label">Alergias</label>
        <textarea id="alergias" class="form-control" [(ngModel)]="paciente.alergias" name="alergias" rows="3"></textarea>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-md-6">
        <label for="cidPrimario" class="form-label">CID Primário</label>
        <input type="text" id="cidPrimario" class="form-control" [(ngModel)]="paciente.cid_primario" name="cid_primario">
      </div>
      <div class="col-md-6">
        <label for="cidSecundario" class="form-label">CID Secundário</label>
        <input type="text" id="cidSecundario" class="form-control" [(ngModel)]="paciente.cid_secundario" name="cid_secundario">
      </div>
    </div>
  </fieldset>


  <!-- Sessão Prestadora -->
  <fieldset id="prestadora" class="mb-4">
    <legend>Sessão Prestadora</legend>
    <div class="mb-3">
      <label for="operadora" class="form-label">Operadora: *</label>
      <input
        id="operadora"
        [(ngModel)]="paciente.operadora"
        name="operadora"
        class="form-control"
        required
      />
    </div>
    <div class="mb-3">
      <label for="identificador_prestadora" class="form-label"
        >Identificador Prestadora: *</label
      >
      <input
        id="identificador_prestadora"
        [(ngModel)]="paciente.identificador_prestadora"
        name="identificador_prestadora"
        class="form-control"
        required
      />
    </div>
    <div class="mb-3">
      <label for="acomodacao" class="form-label">Acomodação: *</label>
      <input
        id="acomodacao"
        [(ngModel)]="paciente.acomodacao"
        name="acomodacao"
        class="form-control"
        required
      />
    </div>
  </fieldset>
</form>
<div class="d-flex justify-content-between">
  <button type="submit" class="btn btn-primary" id="btnSalvar">Cadastrar</button>
  <button type="reset" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
</div>
