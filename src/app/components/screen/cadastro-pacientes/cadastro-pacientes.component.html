<form (ngSubmit)="cadastrarPaciente()" class="form-paciente p-4 shadow rounded">
    <div class="mb-3">
      <label for="nome_completo" class="form-label">Nome Completo</label>
      <input type="text" id="nome_completo" class="form-control" [(ngModel)]="paciente.nome_completo" name="nome_completo" required>
    </div>
    <div class="mb-3">
      <label for="cpf" class="form-label">CPF</label>
      <input type="text" id="cpf" class="form-control" [(ngModel)]="paciente.cpf" name="cpf" required>
    </div>
    <div class="mb-3">
      <label for="operadora" class="form-label">Operadora</label>
      <input type="text" id="operadora" class="form-control" [(ngModel)]="paciente.operadora" name="operadora" required>
    </div>
    <div class="mb-3">
      <label for="cid_primario" class="form-label">CID Primário</label>
      <input type="text" id="cid_primario" class="form-control" [(ngModel)]="paciente.cid_primario" name="cid_primario" required>
    </div>
    <div class="mb-3">
      <label for="cep" class="form-label">CEP</label>
      <input type="text" id="cep" class="form-control" [(ngModel)]="paciente.cep" name="cep" (blur)="buscarEndereco()" required>
    </div>
    <div class="mb-3">
      <label for="rua" class="form-label">Rua</label>
      <input type="text" id="rua" class="form-control" [(ngModel)]="paciente.rua" name="rua" readonly>
    </div>
    <div class="mb-3">
      <label for="numero" class="form-label">Número</label>
      <input type="number" id="numero" class="form-control" [(ngModel)]="paciente.numero" name="numero">
    </div>
    <div class="mb-3">
      <label for="complemento" class="form-label">Complemento</label>
      <input type="text" id="complemento" class="form-control" [(ngModel)]="paciente.complemento" name="complemento">
    </div>
    <div class="mb-3">
      <label for="cidade" class="form-label">Cidade</label>
      <input type="text" id="cidade" class="form-control" [(ngModel)]="paciente.cidade" name="cidade" readonly>
    </div>
    <div class="mb-3">
      <label for="estado" class="form-label">Estado</label>
      <input type="text" id="estado" class="form-control" [(ngModel)]="paciente.estado" name="estado" readonly>
    </div>
    <div class="text-center">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <button type="reset" class="btn btn-secondary">Cancelar</button>
    </div>
  </form>
  <button class="btn btn-secondary mt-4" (click)="router.navigate(['/pacientes'])">Voltar</button>
