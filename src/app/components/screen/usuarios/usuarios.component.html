<main class="main-content">
  <section class="row text-center">
    <article class="col-md-6 col-lg-3 mb-4">
      <div class="card h-100 shadow">
        <header class="card-header">
          <h2 class="card-title text-primary">Usuários</h2>
        </header>
        <div class="card-body">
          <p class="card-text">Gerencie o cadastro e edição de usuários do sistema.</p>
          <button class="btn btn-primary" (click)="navegarPara('usuarios')">Acessar</button>
        </div>
      </div>
    </article>
    <!-- Outros artigos... -->
  </section>

  <!-- Listagem de Usuários Cadastrados -->
  <div class="container mt-4">
    <div class="row mt-4">
      <div class="col-md-12">
        <h3 class="text-center mb-4">Usuários Cadastrados</h3>
        <div class="row">
          <div class="col-12">
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Setor</th>
                  <th>Função</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                @for (usuario of usuarios; track usuario.cpf) {
                  <tr>
                    <td>{{ usuario.nome || 'N/A' }}</td>
                    <td>{{ usuario.setor || 'N/A' }}</td>
                    <td>{{ usuario.funcao || 'N/A' }}</td>
                    <td>
                      <button
                        class="btn btn-danger btn-sm"
                        (click)="removerUsuario(usuario.cpf)"
                      >
                        <i class="fas fa-trash"></i> Excluir
                      </button>
                    </td>
                  </tr>
                } @empty {
                  <tr>
                    <td colspan="4" class="text-center">Nenhum usuário encontrado.</td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
