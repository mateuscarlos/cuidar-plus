<main class="main-content">
  <h2 class="text-center mb-4">Usuários Cadastrados</h2>
  <div class="container mt-4">
    <div class="row mt-4">
      <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <button class="btn btn-primary" (click)="abrirModalBusca()">Pesquisar Usuário</button>
          <button class="btn btn-secondary" (click)="navegarPara('home')">Voltar</button>
        </div>
        <div class="row">
          <div class="col-12">
            <table class="table table-striped" *ngIf="usuarios.length > 0">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Setor</th>
                  <th>Função</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let usuario of usuarios">
                  <td>{{ usuario.nome }}</td>
                  <td>{{ usuario.setor }}</td>
                  <td>{{ usuario.funcao }}</td>
                  <td>
                    <button class="btn btn-primary" (click)="editarUsuario(usuario.cpf)">Editar</button>
                    <button class="btn btn-danger btn-spacing" (click)="confirmarRemocao(usuario.cpf)">Excluir</button>
                  </td>
                </tr>
              </tbody>
            </table>
            <div *ngIf="usuarios.length === 0" class="text-center">
              Nenhum usuário encontrado.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
