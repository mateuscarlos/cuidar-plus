<div class="container">
    <h2>Acompanhamento de Pacientes</h2>
    
    <form>
      <!-- Informações do Paciente -->
      <fieldset id="informacoesPaciente">
        <legend>Informações do Paciente</legend>
        <div class="form-group-inline">
          <div class="form-group">
            <label for="nomeCompleto">Nome Completo</label>
            <input type="text" id="nomeCompleto" class="form-control">
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" class="form-control">
              <option value="em-avaliacao">Em Avaliação</option>
              <option value="ativo">Ativo</option>
              <option value="alta-administrativa">Alta Administrativa</option>
              <option value="alta-obito">Alta Óbito</option>
              <option value="alta-melhora">Alta Melhora</option>
              <option value="alta-hospitalar">Alta Hospitalar</option>
              <option value="encerrado">Encerrado</option>
            </select>
          </div>
        </div>
        <div class="form-group-inline">
          <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" class="form-control">
          </div>
          <div class="form-group">
            <label for="cep">CEP</label>
            <input type="text" id="cep" class="form-control">
          </div>
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" class="form-control">
          </div>
        </div>
        <div class="form-group">
          <label for="rua">Rua</label>
          <input type="text" id="rua" class="form-control">
        </div>
        <div class="form-group-inline">
          <div class="form-group">
            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" class="form-control">
          </div>
          <div class="form-group">
            <label for="estado">Estado</label>
            <input type="text" id="estado" class="form-control">
          </div>
        </div>
        <div class="form-group">
          <label for="contatoEmergenciaNome">Contato Emergência Nome</label>
          <input type="text" id="contatoEmergenciaNome" class="form-control">
        </div>
        <div class="form-group">
          <label for="contatoEmergenciaTelefone">Contato Emergência Telefone</label>
          <input type="text" id="contatoEmergenciaTelefone" class="form-control">
        </div>
      </fieldset>
  
      <!-- Informações de Saúde -->
      <fieldset id="informacoesSaude">
        <legend>Informações de Saúde</legend>
        <div class="form-group">
          <label for="alergias">Alergias</label>
          <input type="text" id="alergias" class="form-control">
        </div>
        <div class="form-group">
          <label for="cidPrimario">CID Primário</label>
          <input type="text" id="cidPrimario" class="form-control">
        </div>
        <div class="form-group">
          <label for="cidSecundario">CID Secundário</label>
          <input type="text" id="cidSecundario" class="form-control">
        </div>
      </fieldset>
  
      <!-- Sessão Prestadora -->
      <fieldset id="prestadora">
        <legend>Sessão Prestadora</legend>
        <div class="form-group">
          <label for="prestadora">Prestadora</label>
          <input type="text" id="prestadora" class="form-control">
        </div>
        <div class="form-group">
          <label for="acomodacao">Acomodação</label>
          <input type="text" id="acomodacao" class="form-control">
        </div>
        <div class="form-group">
          <label for="numeroIdentificador">Número Identificador</label>
          <input type="text" id="numeroIdentificador" class="form-control">
        </div>
      </fieldset>
    </form>
  </div>
