<div class="container">
  <h2>Acompanhamento de Pacientes</h2>
  <form>
    <!-- Informações do Paciente -->
    <fieldset id="informacoesPaciente" class="mb-4">
      <legend>Informações do Paciente</legend>
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="nomeCompleto" class="form-label">Nome Completo</label>
          <input type="text" id="nomeCompleto" class="form-control" [(ngModel)]="paciente.nome_completo" name="nome_completo">
        </div>
        <div class="col-md-6">
          <label for="status" class="form-label">Status</label>
          <select id="status" class="form-select" [(ngModel)]="paciente.status" name="status">
            <option value="em-avaliacao">Em Avaliação</option>
            <option value="ativo">Ativo</option>
            <option value="alta-administrativa">Alta Administrativa</option>
            <option value="alta-obito">Alta Óbito</option>
            <option value="alta-melhora">Alta Melhora</option>
            <option value="alta-hospitalar">Alta Hospitalar</option>
            <option value="encerrado">Encerrado</option>
          </select>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-4">
          <label for="cpf" class="form-label">CPF</label>
          <input type="text" id="cpf" class="form-control" [(ngModel)]="paciente.cpf" name="cpf">
        </div>
        <div class="col-md-4">
          <label for="telefone" class="form-label">Telefone</label>
          <input type="text" id="telefone" class="form-control" [(ngModel)]="paciente.telefone" name="telefone">
        </div>
        <div class="col-md-4">
          <label for="cep" class="form-label">CEP</label>
          <input type="text" id="cep" class="form-control" [(ngModel)]="paciente.cep" name="cep">
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-12">
          <label for="rua" class="form-label">Rua</label>
          <input type="text" id="rua" class="form-control" [(ngModel)]="paciente.rua" name="rua">
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-4">
          <label for="numero" class="form-label">Número</label>
          <input type="text" id="numero" class="form-control" [(ngModel)]="paciente.numero" name="numero">
        </div>
        <div class="col-md-4">
          <label for="complemento" class="form-label">Complemento</label>
          <input type="text" id="complemento" class="form-control" [(ngModel)]="paciente.complemento" name="complemento">
        </div>
        <div class="col-md-4">
          <label for="bairro" class="form-label">Bairro</label>
          <input type="text" id="bairro" class="form-control" [(ngModel)]="paciente.bairro" name="bairro">
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="cidade" class="form-label">Cidade</label>
          <input type="text" id="cidade" class="form-control" [(ngModel)]="paciente.cidade" name="cidade">
        </div>
        <div class="col-md-6">
          <label for="estado" class="form-label">Estado</label>
          <input type="text" id="estado" class="form-control" [(ngModel)]="paciente.estado" name="estado">
        </div>
      </div>
    </fieldset>

    <!-- Informações de Saúde -->
    <fieldset id="informacoesSaude" class="mb-4">
      <legend>Informações de Saúde</legend>
      <div class="row mb-3">
        <div class="col-md-12">
          <label for="alergias" class="form-label">Alergias</label>
          <textarea id="alergias" class="form-control" [(ngModel)]="paciente.alergias" name="alergias" rows="3"></textarea>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="cidPrimario" class="form-label">CID Primário</label>
          <input type="text" id="cidPrimario" class="form-control" [(ngModel)]="paciente.cid_primario" name="cid_primario">
        </div>
        <div class="col-md-6">
          <label for="cidSecundario" class="form-label">CID Secundário</label>
          <input type="text" id="cidSecundario" class="form-control" [(ngModel)]="paciente.cid_secundario" name="cid_secundario">
        </div>
      </div>
    </fieldset>

    <!-- Sessão Prestadora -->
    <fieldset id="prestadora" class="mb-4">
      <legend>Sessão Prestadora</legend>
      <div class="row mb-3">
        <div class="col-md-12">
          <label for="prestadora" class="form-label">Prestadora</label>
          <input type="text" id="prestadora" class="form-control" [(ngModel)]="paciente.operadora" name="operadora">
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-12">
          <label for="acomodacao" class="form-label">Acomodação</label>
          <input type="text" id="acomodacao" class="form-control" [(ngModel)]="paciente.acomodacao" name="acomodacao">
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-12">
          <label for="numeroIdentificador" class="form-label">Número Identificador</label>
          <input type="text" id="numeroIdentificador" class="form-control" [(ngModel)]="paciente.identificador_prestadora" name="identificador_prestadora">
        </div>
      </div>
    </fieldset>

    <!-- Sessão Acompanhamento -->
    <fieldset id="acompanhamento" class="mb-4">
      <legend>Acompanhamento</legend>
      <div class="row mb-3">
        <div class="col-md-12">
          <label for="acompanhamento" class="form-label">Novo Acompanhamento</label>
          <textarea id="acompanhamento" class="form-control" [(ngModel)]="novoAcompanhamento" name="acompanhamento" rows="3"></textarea>
        </div>
      </div>
      <div class="text-center">
        <button type="button" class="btn btn-primary" (click)="adicionarAcompanhamento()">Adicionar Acompanhamento</button>
      </div>
    </fieldset>
  </form>
  <div class="d-flex justify-content-between">
    <button class="btn btn-primary" (click)="editarPaciente()">Editar Paciente</button>
    <button class="btn btn-danger" (click)="confirmarExclusao()">Excluir Paciente</button>
  </div>
</div>
