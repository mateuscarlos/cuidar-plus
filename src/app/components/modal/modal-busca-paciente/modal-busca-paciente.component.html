<div class="modal-header">
  <h5 class="modal-title">Buscar Paciente</h5>
  <button type="button" class="btn-close" aria-label="Close" (click)="onClose()"></button>
</div>
<div class="modal-body">
  <form>
    <div class="form-group">
      <label for="campoBusca">Campo de Busca</label>
      <select class="form-control" id="campoBusca" [(ngModel)]="campoBusca" name="campoBusca">
        <option value="id">ID</option>
        <option value="nome_completo">Nome Completo</option>
        <option value="cpf">CPF</option>
      </select>
    </div>
    <div class="form-group">
      <label for="valorBusca">Valor</label>
      <input type="text" class="form-control" id="valorBusca" placeholder="Digite o valor da busca" [(ngModel)]="valorBusca" name="valorBusca">
    </div>
  </form>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="onClose()">Fechar</button>
  <button type="button" class="btn btn-primary ml-2" (click)="buscarPaciente()">Buscar</button>
</div>
