<div class="modal-content p-4">
  <h2 class="text-center mb-4">Pesquisar Usuário</h2>
  <div class="mb-3">
    <label for="nome" class="form-label">Nome</label>
    <input type="text" id="nome" class="form-control" [(ngModel)]="nome">
  </div>
  <button class="btn btn-primary" (click)="pesquisar()">Pesquisar</button>
  <div class="mt-4">
    <table class="table table-striped" *ngIf="usuarios.length > 0">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Setor</th>
          <th>Função</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let usuario of usuarios">
          <td>{{ usuario.nome }}</td>
          <td>{{ usuario.setor }}</td>
          <td>{{ usuario.funcao }}</td>
          <td>
            <button class="btn btn-primary" (click)="selecionarUsuario(usuario)">Selecionar</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="usuarios.length === 0" class="text-center">
      Nenhum usuário encontrado.
    </div>
  </div>
  <button class="btn btn-secondary mt-4" (click)="fechar()">Fechar</button>
</div>
